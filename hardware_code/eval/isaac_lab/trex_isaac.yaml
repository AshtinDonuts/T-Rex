asset:
  usd_path: generated/usd/vega_1_sharpa_wave/vega_1_sharpa_wave.usda
  prim_path: /World/Robot

inference:
  server_address: tcp://localhost:5678
  task_description: "Pick up the object."
  chunk_size: 16
  execute_steps_per_chunk: 16
  max_steps: 256
  use_tactile_refine: false
  request_timeout_ms: 120000
  head_crop_box: [0, 300, 140, 540]

simulation:
  dt: 0.0166666667
  render_interval: 1
  table_height: 0.76
  settle_steps: 60
  ik_damping: 0.05
  ik_step_scale: 0.7

# Tracker-independent hand-keypoint teleoperation. Packets are UDP JSON with
# MediaPipe/OpenPose 21-keypoint ordering; see README.md for the schema.
keypoint_teleop:
  required_sides: [left, right]
  keypoint_frame_id: d405
  bind_host: 0.0.0.0
  port: 7001
  timeout_s: 0.5
  min_confidence: 0.5
  filter_alpha: 0.35
  max_keypoint_jump_m: 0.08
  palm_position_alpha: 0.3
  palm_rotation_alpha: 0.25
  max_palm_jump_m: 0.10
  max_palm_jump_rad: 0.7
  calibration_frames: 30
  # Rotation from the keypoint camera frame into the robot base frame. This
  # Identity is sufficient for hand-only testing. Calibrate this D405-camera
  # to robot-base rotation before enabling arm retargeting.
  camera_to_robot_quaternion_wxyz: [1.0, 0.0, 0.0, 0.0]
  arm_translation_scale: 1.0
  arm_ik_damping: 0.05
  arm_posture_regularization: 0.002
  arm_orientation_weight: 0.35
  arm_max_joint_step: 0.04
  arm_target_smoothing: 0.4
  arm_workspace:
    left: {min: [0.15, -0.8, 0.35], max: [1.15, 0.8, 1.55]}
    right: {min: [0.15, -0.8, 0.35], max: [1.15, 0.8, 1.55]}
  abort_timeout_s: 2.0
  ik_damping: 0.04
  neutral_regularization: 0.002
  max_joint_step: 0.08
  target_smoothing: 0.45
  marker_weights: [0.35, 0.55, 1.0]  # PIP, DIP, fingertip
  max_steps: 1800
  record_stride: 2  # 60 Hz simulation -> canonical 30 Hz demonstrations
  output_dir: teleop_data

robot:
  left_ee_body: left_hand_flange
  right_ee_body: right_hand_flange
  left_arm_joints: [L_arm_j1, L_arm_j2, L_arm_j3, L_arm_j4, L_arm_j5, L_arm_j6, L_arm_j7]
  right_arm_joints: [R_arm_j1, R_arm_j2, R_arm_j3, R_arm_j4, R_arm_j5, R_arm_j6, R_arm_j7]
  # Policy/SDK order. Do not replace with articulation order: PhysX sorts by topology.
  left_hand_joints:
    [left_thumb_CMC_FE, left_thumb_CMC_AA, left_thumb_MCP_FE, left_thumb_MCP_AA, left_thumb_IP,
     left_index_MCP_FE, left_index_MCP_AA, left_index_PIP, left_index_DIP,
     left_middle_MCP_FE, left_middle_MCP_AA, left_middle_PIP, left_middle_DIP,
     left_ring_MCP_FE, left_ring_MCP_AA, left_ring_PIP, left_ring_DIP,
     left_pinky_CMC, left_pinky_MCP_FE, left_pinky_MCP_AA, left_pinky_PIP, left_pinky_DIP]
  right_hand_joints:
    [right_thumb_CMC_FE, right_thumb_CMC_AA, right_thumb_MCP_FE, right_thumb_MCP_AA, right_thumb_IP,
     right_index_MCP_FE, right_index_MCP_AA, right_index_PIP, right_index_DIP,
     right_middle_MCP_FE, right_middle_MCP_AA, right_middle_PIP, right_middle_DIP,
     right_ring_MCP_FE, right_ring_MCP_AA, right_ring_PIP, right_ring_DIP,
     right_pinky_CMC, right_pinky_MCP_FE, right_pinky_MCP_AA, right_pinky_PIP, right_pinky_DIP]
  hand_palm_bodies: {left: left_hand_C_MC, right: right_hand_C_MC}
  # PIP joint frame, DIP joint frame, fingertip for thumb through pinky.
  hand_tracking_bodies:
    left:
      [left_thumb_PP, left_thumb_DP, left_thumb_fingertip,
       left_index_MP, left_index_DP, left_index_fingertip,
       left_middle_MP, left_middle_DP, left_middle_fingertip,
       left_ring_MP, left_ring_DP, left_ring_fingertip,
       left_pinky_MP, left_pinky_DP, left_pinky_fingertip]
    right:
      [right_thumb_PP, right_thumb_DP, right_thumb_fingertip,
       right_index_MP, right_index_DP, right_index_fingertip,
       right_middle_MP, right_middle_DP, right_middle_fingertip,
       right_ring_MP, right_ring_DP, right_ring_fingertip,
       right_pinky_MP, right_pinky_DP, right_pinky_fingertip]
  left_arm_initial: [0.84, 0.51, 0.37, -1.30, -0.65, -0.29, -0.03]
  right_arm_initial: [-0.84, -0.51, -0.37, -1.30, 0.65, 0.29, 0.03]
  torso_initial: [0.9, 1.57, 0.1]
  head_initial: [0.28, 0.0, 0.0]

cameras:
  width: 640
  height: 360
  focal_length: 24.0
  horizontal_aperture: 20.955
  head:
    parent: base
    position: [0.65, 0.0, 1.45]
    quaternion_wxyz: [0.5, 0.5, -0.5, -0.5]
  left_wrist:
    parent: L_arm_l8
    position: [0.02, 0.06, 0.02]
    quaternion_wxyz: [0.5, 0.5, -0.5, -0.5]
  right_wrist:
    parent: R_arm_l8
    position: [0.02, -0.06, 0.02]
    quaternion_wxyz: [0.5, 0.5, -0.5, -0.5]
